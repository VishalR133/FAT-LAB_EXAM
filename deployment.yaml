apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: html-demo
  template:
    metadata:
      labels:
        app: html-demo
    spec:
      containers:
      - name: html-container
        image: vishal133/html-demo:latest
        ports:
        - containerPort: 80
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: student-service
spec:
  type: NodePort
  selector:
    app: html-demo
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007
